syntax = "proto3";

package clock;
option go_package = "github.com/Kenji-Uema/guestSimulator/internal/transport/grpc/pb/clock;clock";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "event/time_event.proto";

service ClockService {
  rpc Now (google.protobuf.Empty) returns (event.TimeEvent);
}
