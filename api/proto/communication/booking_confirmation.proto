syntax = "proto3";

package communication.v1;
option go_package = "github.com/Kenji-Uema/guestSimulator/internal/transport/grpc/pb/communication;communication";

import "google/protobuf/timestamp.proto";

message BookingConfirmedNotificationEvent {
  string id = 1;
  string booking_id = 2;

  BookingStatus booking_status = 4;

  Guest guest = 5;
  BookingConfirmationSummary booking = 6;

  google.protobuf.Timestamp confirmed_at = 8;
}

message Guest {
  string guest_id = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
}

message BookingConfirmationSummary {
  string cottage_name = 1;
  google.protobuf.Timestamp check_in = 2;
  google.protobuf.Timestamp check_out = 3;
  int32 nights = 4;
  int32 number_of_guests = 5;
}

enum BookingStatus {
  BOOKING_STATUS_UNSPECIFIED = 0;
  BOOKING_STATUS_PENDING = 1;
  BOOKING_STATUS_CONFIRMED = 2;
  BOOKING_STATUS_CANCELLED = 3;
}
